name: phorm_mariadb
description: >
  MariaDB driver for the PHORM ORM.
  Provides a PhormDatabase implementation backed by MariaDB,
  including connection management, dialect support, and async query execution.
version: 0.0.1
repository: https://github.com/interdev7/phorm
homepage: https://github.com/interdev7/phorm/tree/main/packages/phorm_mariadb
issue_tracker: https://github.com/interdev7/phorm/issues
license: MIT
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  meta: ^1.16.0
  phorm:
    path: ../phorm

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.15
