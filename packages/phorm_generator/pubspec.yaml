name: phorm_generator
version: 1.3.0
description: >
  Code generator for PHORM that turns @Schema-annotated Dart models into SQL
  table schemas, migrations, JSON mappers and runtime metadata for SQLite,
  PostgreSQL and MySQL.
repository: https://github.com/interdev7/phorm
homepage: https://github.com/interdev7/phorm/tree/main/packages/phorm_generator
issue_tracker: https://github.com/interdev7/phorm/issues
license: MIT

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  analyzer: ">=6.4.1 <6.9.0"
  build: ^2.4.0
  dart_style: ^2.2.0
  path: ^1.9.1
  phorm_annotations: ^1.3.0
  source_gen: ^1.3.0

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^2.0.0
  lints: ^3.0.0
  test: ^1.25.15
  very_good_analysis: ^8.0.0

dependency_overrides:
  phorm_annotations:
    path: ../phorm_annotations

screenshots:
  - description: The PHORM Generator package logo.
    path: screenshots/logo.png
