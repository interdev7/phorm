name: CI

# Trigger workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze_and_test:
    name: ${{ matrix.package-name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Dart-only package with tests
          - package-name: phorm_annotations
            package-path: packages/phorm_annotations
            sdk: dart
            run-tests: true

          # Flutter package with tests
          - package-name: phorm
            package-path: packages/phorm
            sdk: flutter
            run-tests: true

          # Dart-only generator package with tests
          - package-name: phorm_generator
            package-path: packages/phorm_generator
            sdk: dart
            run-tests: true

          # Dart-only database driver with tests
          - package-name: phorm_mysql
            package-path: packages/phorm_mysql
            sdk: dart
            run-tests: true

          # Dart-only database driver with tests
          - package-name: phorm_postgres
            package-path: packages/phorm_postgres
            sdk: dart
            run-tests: true

          # Flutter database driver with tests
          - package-name: phorm_sqlite
            package-path: packages/phorm_sqlite
            sdk: flutter
            run-tests: true
            build-runner: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Flutter SDK which also contains Dart SDK
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.2

      # Resolve dependencies
      - name: Install dependencies
        working-directory: ${{ matrix.package-path }}
        run: flutter pub get

      # Generate code (build_runner) for packages that need it
      - name: Generate code
        if: ${{ matrix.build-runner }}
        working-directory: ${{ matrix.package-path }}
        run: dart run build_runner build --delete-conflicting-outputs

      # Analyze code
      - name: Analyze code
        working-directory: ${{ matrix.package-path }}
        run: flutter analyze

      # Run Flutter unit tests with coverage
      - name: Run tests with coverage (Flutter)
        if: ${{ matrix.run-tests && matrix.sdk == 'flutter' }}
        working-directory: ${{ matrix.package-path }}
        run: flutter test --coverage

      # Run Dart unit tests with coverage using globally activated coverage package
      - name: Run tests with coverage (Dart)
        if: ${{ matrix.run-tests && matrix.sdk == 'dart' }}
        working-directory: ${{ matrix.package-path }}
        run: |
          flutter pub global activate coverage
          flutter pub global run coverage:test_with_coverage

      # Upload coverage reports to Codecov
      - name: Upload coverage reports to Codecov
        if: ${{ matrix.run-tests }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ${{ matrix.package-path }}/coverage/lcov.info
          flags: ${{ matrix.package-name }}
          name: ${{ matrix.package-name }}-coverage
          fail_ci_if_error: false

  # Automatically tag packages whose pubspec version has no matching git tag.
  # Runs only on pushes to main (after all tests pass).
  # Created tags trigger release.yml → GitHub Release.
  auto_tag:
    name: Auto-tag packages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: analyze_and_test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history to check existing tags

      - name: Create tags for new versions
        run: |
          set -euo pipefail

          PACKAGES=(
            phorm_annotations
            phorm
            phorm_generator
            phorm_mysql
            phorm_postgres
            phorm_sqlite
          )

          for pkg in "${PACKAGES[@]}"; do
            pubspec="packages/$pkg/pubspec.yaml"
            if [ ! -f "$pubspec" ]; then
              echo "⚠️  $pubspec not found — skipping"
              continue
            fi

            version="$(awk '/^version:/{print $2; exit}' "$pubspec")"
            tag="${pkg}-v${version}"

            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1; then
              echo "✅ $tag already exists — skipping"
            elif git ls-remote --tags origin "$tag" 2>/dev/null | grep -q "$tag"; then
              echo "✅ $tag exists on remote — skipping"
            else
              echo "🏷️  Creating tag $tag"
              git tag "$tag"
              git push origin "$tag"
            fi
          done
