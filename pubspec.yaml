name: phorm_workspace
description: PHORM Workspace Root — A lightweight, type-safe, driver-agnostic ORM for Dart and Flutter.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

workspace:
  - phorm
  - phorm_annotations
  - phorm_sqlite
  - phorm_generator
  - examples

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^3.0.0
  very_good_analysis: ^8.0.0
