include: package:very_good_analysis/analysis_options.yaml

# lib/ is fully clean except the rules listed below; several entries are
# only violated by the (extensive) test suite — see the TODOs.
analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.sql.g.dart"
    - "**/*.fn.g.dart"
  errors:
    always_use_package_imports: ignore # relative imports inside lib/src and test
    avoid_positional_boolean_parameters: ignore
    avoid_slow_async_io: ignore # deliberate File.exists checks around DB files
    lines_longer_than_80_chars: ignore
    prefer_single_quotes: ignore
    sort_constructors_first: ignore
    use_to_and_as_if_applicable: ignore
    # TODO(lints): the rules below are only violated in test/; clean up
    # incrementally and re-enable.
    avoid_catches_without_on_clauses: ignore
    avoid_print: ignore
    avoid_redundant_argument_values: ignore
    cast_nullable_to_non_nullable: ignore
    inference_failure_on_instance_creation: ignore
    non_constant_identifier_names: ignore
    omit_local_variable_types: ignore
    prefer_const_declarations: ignore
    prefer_int_literals: ignore
    public_member_api_docs: ignore # TODO(lints): document lib/ and drop
    unnecessary_lambdas: ignore
    unnecessary_nullable_for_final_variable_declarations: ignore
    use_raw_strings: ignore
    avoid_equals_and_hash_code_on_mutable_classes: ignore
    avoid_field_initializers_in_const_classes: ignore
    prefer_const_constructors: ignore
    specify_nonobvious_property_types: ignore
