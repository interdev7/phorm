name: phorm_sqlite
description: The SQLite driver and connection manager implementation for the PHORM.
version: 1.5.1
repository: https://github.com/interdev7/phorm
homepage: https://github.com/interdev7/phorm/tree/main/packages/phorm_sqlite
issue_tracker: https://github.com/interdev7/phorm/issues
license: MIT
topics:
  - orm
  - sqlite
  - database
  - sql

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.16.0
  path: ^1.9.0
  path_provider: ^2.1.5
  phorm: ^1.4.1
  sqlite3: ^3.3.4
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlite3_web: ^0.9.2

dev_dependencies:
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  # Pinned below 1.4.0: phorm_generator 1.4.0 pulls analyzer 13 (meta ^1.18.3),
  # which conflicts with the meta version pinned by the current Flutter SDK.
  # Bump once Flutter ships meta >=1.18.3.
  phorm_generator: ">=1.3.0 <1.4.0"
  very_good_analysis: ^10.3.0

# Keep melos bootstrap from path-linking the local phorm_generator: its
# analyzer ^13 needs meta ^1.18.3, which conflicts with the meta pinned by
# flutter_test on the current Flutter stable. Melos skips dependencies that
# already have an explicit override here. Remove once Flutter ships
# meta >=1.18.3.
dependency_overrides:
  phorm_generator: ">=1.3.0 <1.4.0"

screenshots:
  - description: The PHORM SQLite package logo.
    path: screenshots/logo.png
