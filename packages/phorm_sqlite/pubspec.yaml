name: phorm_sqlite
description: The SQLite driver and connection manager implementation for the PHORM ORM.
version: 1.0.0
repository: https://github.com/interdev7/phorm
homepage: https://github.com/interdev7/phorm/tree/main/phorm_sqlite
issue_tracker: https://github.com/interdev7/phorm/issues
license: MIT
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.16.0
  path: ^1.9.0
  path_provider: ^2.1.5
  phorm:
    path: ../phorm
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.0
  sqlite3_web: ^0.3.1

dev_dependencies:
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  phorm_generator:
    path: ../phorm_generator
  test: ^1.25.15
