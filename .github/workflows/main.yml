name: CI

# Trigger workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze_and_test:
    name: ${{ matrix.package-name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Dart-only package with tests
          - package-name: phorm_annotations
            package-path: packages/phorm_annotations
            sdk: dart
            run-tests: true

          # Flutter package with tests
          - package-name: phorm
            package-path: packages/phorm
            sdk: flutter
            run-tests: true

          # Dart-only generator package with tests
          - package-name: phorm_generator
            package-path: packages/phorm_generator
            sdk: dart
            run-tests: true

          # Dart-only database driver with tests
          - package-name: phorm_mysql
            package-path: packages/phorm_mysql
            sdk: dart
            run-tests: true

          # Dart-only database driver with tests
          - package-name: phorm_postgres
            package-path: packages/phorm_postgres
            sdk: dart
            run-tests: true

          # Flutter database driver with tests
          - package-name: phorm_sqlite
            package-path: packages/phorm_sqlite
            sdk: flutter
            run-tests: true
            build-runner: true

          # Dart-only DevTools bridge with tests
          - package-name: phorm_devtools
            package-path: packages/phorm_devtools
            sdk: dart
            run-tests: true

          # Flutter web DevTools panel (analyze only)
          - package-name: phorm_devtools_extension
            package-path: packages/phorm_devtools_extension
            sdk: flutter
            run-tests: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Flutter SDK which also contains Dart SDK
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      # Resolve dependencies
      - name: Install dependencies
        working-directory: ${{ matrix.package-path }}
        run: flutter pub get

      # Generate code (build_runner) for packages that need it
      - name: Generate code
        if: ${{ matrix.build-runner }}
        working-directory: ${{ matrix.package-path }}
        run: dart run build_runner build --delete-conflicting-outputs

      # Analyze code
      - name: Analyze code
        working-directory: ${{ matrix.package-path }}
        run: flutter analyze

      # Run Flutter unit tests with coverage
      - name: Run tests with coverage (Flutter)
        if: ${{ matrix.run-tests && matrix.sdk == 'flutter' }}
        working-directory: ${{ matrix.package-path }}
        run: flutter test --coverage

      # Run Dart unit tests with coverage using globally activated coverage package
      - name: Run tests with coverage (Dart)
        if: ${{ matrix.run-tests && matrix.sdk == 'dart' }}
        working-directory: ${{ matrix.package-path }}
        run: |
          flutter pub global activate coverage
          flutter pub global run coverage:test_with_coverage

      # Upload coverage reports to Codecov
      - name: Upload coverage reports to Codecov
        if: ${{ matrix.run-tests }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ${{ matrix.package-path }}/coverage/lcov.info
          flags: ${{ matrix.package-name }}
          name: ${{ matrix.package-name }}-coverage
          fail_ci_if_error: false

  # Automatically tag packages whose pubspec version has no matching git tag,
  # then create a GitHub Release for each new tag.
  # NOTE: Tags created via GITHUB_TOKEN do not trigger other workflows,
  # so the release is created here instead of relying on release.yml.
  # release.yml still works for manually pushed tags.
  auto_tag:
    name: Auto-tag & release packages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: analyze_and_test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history to check existing tags

      - name: Tag new versions and create releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PACKAGES=(
            phorm_annotations
            phorm
            phorm_generator
            phorm_mysql
            phorm_postgres
            phorm_sqlite
            phorm_devtools
          )

          for pkg in "${PACKAGES[@]}"; do
            pubspec="packages/$pkg/pubspec.yaml"
            if [ ! -f "$pubspec" ]; then
              echo "⚠️  $pubspec not found — skipping"
              continue
            fi

            version="$(awk '/^version:/{print $2; exit}' "$pubspec")"
            tag="${pkg}-v${version}"

            # Skip if tag already exists locally or on remote
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1; then
              echo "✅ $tag already exists — skipping"
              continue
            fi
            if git ls-remote --tags origin "$tag" 2>/dev/null | grep -q "$tag"; then
              echo "✅ $tag exists on remote — skipping"
              continue
            fi

            echo "🏷️  Creating tag $tag"
            git tag "$tag"
            git push origin "$tag"

            # Extract release notes from CHANGELOG.md
            changelog="packages/$pkg/CHANGELOG.md"
            notes_file="$(mktemp)"
            if [ -f "$changelog" ]; then
              awk -v ver="$version" '
                /^## / {
                  hdr = $0
                  sub(/^##[[:space:]]+/, "", hdr)
                  gsub(/[][]/, "", hdr)
                  split(hdr, a, /[[:space:]]+/)
                  if (a[1] == ver) { cap = 1; next }
                  else if (cap) { exit }
                  next
                }
                cap { print }
              ' "$changelog" > "$notes_file"
            fi
            [ -s "$notes_file" ] || echo "Release $pkg $version" > "$notes_file"

            # Detect pre-release (versions containing a hyphen)
            prerelease_flag=""
            if [[ "$version" == *-* ]]; then
              prerelease_flag="--prerelease"
            fi

            echo "📦 Creating GitHub Release for $tag"
            gh release create "$tag" \
              --title "$pkg $version" \
              --notes-file "$notes_file" \
              $prerelease_flag

            rm -f "$notes_file"
          done
