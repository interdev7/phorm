include: package:very_good_analysis/analysis_options.yaml

# Deliberate style deviations only; everything else from
# very_good_analysis is enforced.
analyzer:
  errors:
    always_use_package_imports: ignore # relative imports inside lib/src
    avoid_print: ignore # console logger and migration warnings print by design
    avoid_returning_this: ignore # fluent builder API
    lines_longer_than_80_chars: ignore
    prefer_single_quotes: ignore
    sort_constructors_first: ignore
    use_to_and_as_if_applicable: ignore
