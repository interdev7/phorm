name: Release

# Create a GitHub Release when a version tag is pushed.
#
# Versions across PHORM packages are kept in sync, so a single tag like
# `v1.1.0` produces one Release whose notes are assembled from each package's
# CHANGELOG.md section for that version.
#
#   git tag v1.1.0
#   git push origin v1.1.0
#
# Pre-release tags (containing a hyphen, e.g. `v1.2.0-rc.1`) are marked as
# pre-releases automatically.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble release notes from CHANGELOGs
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          NOTES_FILE="release_notes.md"
          : > "$NOTES_FILE"

          for dir in packages/*/; do
            pkg="$(basename "$dir")"
            changelog="${dir}CHANGELOG.md"
            [ -f "$changelog" ] || continue

            # Extract the section for VERSION. Handles both `## [1.1.0]`
            # and `## 1.1.0` heading styles; stops at the next `## ` heading.
            section="$(awk -v ver="$VERSION" '
              /^## / {
                hdr = $0
                sub(/^##[[:space:]]+/, "", hdr)
                gsub(/[][]/, "", hdr)
                split(hdr, a, /[[:space:]]+/)
                if (a[1] == ver) { cap = 1; next }
                else if (cap) { exit }
                next
              }
              cap { print }
            ' "$changelog")"

            # Trim leading/trailing blank lines.
            section="$(printf '%s\n' "$section" | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)"

            if [ -n "$section" ]; then
              {
                echo "## $pkg $VERSION"
                echo
                echo "$section"
                echo
              } >> "$NOTES_FILE"
            fi
          done

          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release $VERSION" > "$NOTES_FILE"
          fi

          echo "----- release notes -----"
          cat "$NOTES_FILE"

      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release_notes.md \
            ${{ steps.prerelease.outputs.flag }}

  # Automatic, keyless publishing to pub.dev via GitHub OIDC.
  #
  # One-time setup required on pub.dev (per package): Admin -> "Automated
  # publishing" -> enable GitHub Actions, repository `interdev7/phorm`, and an
  # allowed tag pattern of `v{{version}}`. The `id-token: write` permission lets
  # `pub` exchange a GitHub OIDC token for a short-lived pub.dev credential — no
  # secrets to store.
  publish:
    name: Publish to pub.dev
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC auth to pub.dev
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Flutter SDK also provides Dart; needed because `phorm` and
      # `phorm_sqlite` declare the Flutter SDK as a dependency.
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          version: 3.29.2

      - name: Publish packages (dependency order)
        run: |
          set -uo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # Skip a package whose pubspec version doesn't match the tag, or that
          # is already on pub.dev (makes re-runs idempotent).
          already_published() {
            local pkg="$1"
            curl -sf "https://pub.dev/api/packages/$pkg" 2>/dev/null \
              | tr ',' '\n' | grep -q "\"version\":\"$VERSION\""
          }

          publish_pkg() {
            local pkg="$1"
            local dir="packages/$pkg"
            local pubver
            pubver="$(awk '/^version:/{print $2; exit}' "$dir/pubspec.yaml")"

            if [ "$pubver" != "$VERSION" ]; then
              echo "::notice::Skipping $pkg (pubspec $pubver != tag $VERSION)"
              return 0
            fi
            if already_published "$pkg"; then
              echo "::notice::Skipping $pkg ($VERSION already on pub.dev)"
              return 0
            fi

            # Retry to tolerate pub.dev indexing delay of just-published deps.
            local tries=12 n=1
            while true; do
              if (cd "$dir" && flutter pub publish --force); then
                echo "Published $pkg $VERSION"
                return 0
              fi
              if already_published "$pkg"; then
                echo "::notice::$pkg $VERSION appeared on pub.dev after retry"
                return 0
              fi
              if [ "$n" -ge "$tries" ]; then
                echo "::error::Failed to publish $pkg after $tries attempts"
                return 1
              fi
              echo "Retry $pkg in 30s ($n/$tries)…"
              sleep 30
              n=$((n + 1))
            done
          }

          for pkg in phorm_annotations phorm_generator phorm \
                     phorm_sqlite phorm_mysql phorm_postgres; do
            publish_pkg "$pkg" || exit 1
          done
