name: sqflow_lite
description: The SQLite driver and connection manager implementation for the Sqflow ORM.
version: 1.0.0
repository: https://github.com/interdev7/sqflow
homepage: https://github.com/interdev7/sqflow
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.16.0
  path: ^1.9.0
  path_provider: ^2.1.5
  sqlite3: ^2.9.4
  sqlite3_web: ^0.3.1
  sqflow_core:
    path: ../sqflow_core
  sqflow_platform_interface:
    path: ../sqflow_platform_interface

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
