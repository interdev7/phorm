name: sqflow_lite
description: The SQLite driver and connection manager implementation for the Sqflow ORM.
version: 1.0.0
repository: https://github.com/interdev7/sqflow_lite
homepage: https://github.com/interdev7/sqflow_lite
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.16.0
  path: ^1.9.0
  path_provider: ^2.1.5
  sqflow_core:
    path: ../sqflow_core
  sqflow_platform_interface:
    path: ../sqflow_platform_interface
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.0
  sqlite3_web: ^0.3.1

dev_dependencies:
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  sqflow_generator:
    path: ../sqflow_generator
  test: ^1.25.15
