name: sqflow_core
description: A flexible CRUD service for SQLite in Flutter/Dart with soft delete, advanced querying (WhereBuilder), sorting, and schema management.
version: 1.4.0
repository: https://github.com/interdev7/sqflow
homepage: https://github.com/interdev7/sqflow
issues: https://github.com/interdev7/sqflow/issues
resolution: workspace

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.16.0
  path: ^1.9.0
  path_provider: ^2.1.5
  sqflow_platform_interface:
    path: ../sqflow_platform_interface
  sqlite3: ^2.4.6
dev_dependencies:
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  sqflow_generator:
    path: ../sqflow_generator
  test: ^1.25.15

# Publication to pub.dev
publish_to: none
