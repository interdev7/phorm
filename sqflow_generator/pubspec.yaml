name: sqflow_generator
version: 1.0.0
description: SQL Table Schema Generator for Flutter
repository: https://github.com/interdev7/sqflow
homepage: https://github.com/interdev7/sqflow
issues: https://github.com/interdev7/sqflow/issues
resolution: workspace

publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  _fe_analyzer_shared: ^76.0.0
  analyzer: ^6.11.0
  build: ^2.4.0
  dart_style: ^2.2.0
  path: ^1.9.1
  source_gen: ^1.3.0
  sqflow_platform_interface:
    path: ../sqflow_platform_interface

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^2.0.0
  lints: ^3.0.0
