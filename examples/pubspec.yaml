name: sqflow_example
description: Example app for sqflow.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  path: ^1.9.0
  sqflite: ^2.4.2
  sqflow_core:
    path: ../sqflow_core
  sqflow_generator:
    path: ../sqflow_generator
  sqflow_platform_interface:
    path: ../sqflow_platform_interface
  uuid: ^4.5.2

dev_dependencies:
  build_runner: ^2.0.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.6

flutter:
  uses-material-design: true
