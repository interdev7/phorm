name: phorm_annotations
version: 1.5.0
description: >
  Annotation library for declarative SQL table and schema definitions in Dart.
  Designed to be used with code generators that produce SQL schemas,
  migrations, or runtime metadata.

repository: https://github.com/interdev7/phorm
homepage: https://github.com/interdev7/phorm/tree/main/packages/phorm_annotations
issue_tracker: https://github.com/interdev7/phorm/issues
license: MIT
topics:
  - orm
  - annotations
  - code-generation
  - database
  - sql

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  meta: ^1.9.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.15
  very_good_analysis: ^8.0.0

screenshots:
  - description: The PHORM Annotations package logo.
    path: screenshots/logo.png
