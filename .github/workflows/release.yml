name: Release

# Per-package releases. Each package is released independently with a tag of
# the form `<package>-v<version>`, so a change to one package never forces a
# version bump on the others.
#
#   # release only phorm_annotations 1.1.1
#   git tag phorm_annotations-v1.1.1
#   git push origin phorm_annotations-v1.1.1
#
# The tag must match the package's `version:` in its pubspec.yaml. Pre-release
# versions (containing a hyphen, e.g. `phorm-v1.2.0-rc.1`) are flagged as
# pre-releases automatically.

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse tag and validate
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PACKAGE="${TAG%-v*}"   # strip trailing -v<version>
          VERSION="${TAG##*-v}"  # keep <version>

          dir="packages/$PACKAGE"
          if [ ! -f "$dir/pubspec.yaml" ]; then
            echo "::error::Unknown package '$PACKAGE' (no $dir/pubspec.yaml). Tag must be <package>-v<version>."
            exit 1
          fi

          pubver="$(awk '/^version:/{print $2; exit}' "$dir/pubspec.yaml")"
          if [ "$pubver" != "$VERSION" ]; then
            echo "::error::Tag version $VERSION does not match $PACKAGE pubspec version $pubver."
            exit 1
          fi

          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          PACKAGE="${{ steps.meta.outputs.package }}"
          VERSION="${{ steps.meta.outputs.version }}"
          changelog="packages/$PACKAGE/CHANGELOG.md"

          NOTES_FILE="release_notes.md"
          : > "$NOTES_FILE"

          if [ -f "$changelog" ]; then
            # Extract the section for VERSION. Handles both `## [1.1.1]`
            # and `## 1.1.1` heading styles; stops at the next `## ` heading.
            awk -v ver="$VERSION" '
              /^## / {
                hdr = $0
                sub(/^##[[:space:]]+/, "", hdr)
                gsub(/[][]/, "", hdr)
                split(hdr, a, /[[:space:]]+/)
                if (a[1] == ver) { cap = 1; next }
                else if (cap) { exit }
                next
              }
              cap { print }
            ' "$changelog" > "$NOTES_FILE"
          fi

          # Trim leading/trailing blank lines; fall back to a minimal note.
          if [ -s "$NOTES_FILE" ]; then
            trimmed="$(sed -e '/./,$!d' "$NOTES_FILE" | tac | sed -e '/./,$!d' | tac)"
            printf '%s\n' "$trimmed" > "$NOTES_FILE"
          else
            echo "Release $PACKAGE $VERSION" > "$NOTES_FILE"
          fi

          echo "----- release notes -----"
          cat "$NOTES_FILE"

      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "${{ steps.meta.outputs.version }}" == *-* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${{ steps.meta.outputs.package }} ${{ steps.meta.outputs.version }}" \
            --notes-file release_notes.md \
            ${{ steps.prerelease.outputs.flag }}
